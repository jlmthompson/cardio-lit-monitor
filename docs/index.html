<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cardio Lit Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e2d3e;
      color: #334155;
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      background: #162333;
      border-bottom: 3px solid #0d9488;
      padding: 28px 24px 20px;
      text-align: center;
    }
    .site-header h1 {
      font-size: 1.7rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .site-header .subtitle {
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .site-header a { color: #0d9488; text-decoration: none; }
    .site-header a:hover { text-decoration: underline; }

    /* ── Summary card ── */
    .summary-wrap {
      max-width: 820px;
      margin: 28px auto 0;
      padding: 0 20px;
    }
    .summary-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      border-top: 4px solid #0d9488;
    }
    .summary-card h2 {
      font-size: 0.95rem;
      font-weight: 700;
      color: #0d9488;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .summary-header {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 8px;
    }
    .summary-card ul {
      list-style: none;
      margin-bottom: 10px;
    }
    .summary-card ul li {
      font-size: 0.85rem;
      color: #475569;
      padding: 3px 0;
    }
    .summary-card ul li::before {
      content: "→ ";
      color: #0d9488;
    }
    .highlight-line {
      font-size: 0.82rem;
      color: #64748b;
      border-top: 1px solid #e2e8f0;
      padding-top: 10px;
      margin-top: 6px;
      font-style: italic;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #e2e8f0;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #475569;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Controls ── */
    .controls {
      max-width: 820px;
      margin: 16px auto 0;
      padding: 0 20px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    #search {
      flex: 1;
      max-width: 320px;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.85rem;
      color: #1e293b;
    }
    #search:focus { outline: none; border-color: #0d9488; box-shadow: 0 0 0 2px #0d948820; }
    #search::placeholder { color: #94a3b8; }
    .count-badge {
      font-size: 0.8rem;
      color: #94a3b8;
    }

    /* ── Cards ── */
    .cards-wrap {
      max-width: 820px;
      margin: 16px auto 40px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .card {
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.12);
      display: flex;
      overflow: hidden;
      transition: box-shadow 0.15s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
    .card-accent {
      width: 5px;
      flex-shrink: 0;
    }
    .card-body {
      padding: 16px 18px;
      flex: 1;
      min-width: 0;
    }
    .card-meta {
      margin-bottom: 7px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .btype {
      background: #f1f5f9;
      color: #64748b;
    }
    .topic {
      /* colour injected inline */
    }
    .card-title {
      font-size: 0.92rem;
      font-weight: 600;
      color: #0f172a;
      text-decoration: none;
      line-height: 1.45;
      display: block;
      margin-bottom: 5px;
    }
    .card-title:hover { color: #0d9488; }
    .card-authors {
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 8px;
    }
    .card-abstract {
      font-size: 0.8rem;
      color: #475569;
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .card-links {
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 0.75rem;
    }
    .ext {
      color: #0d9488;
      text-decoration: none;
      font-weight: 500;
    }
    .ext:hover { text-decoration: underline; }
    .ris-btn {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #475569;
      padding: 3px 9px;
      border-radius: 4px;
      font-size: 0.7rem;
      cursor: pointer;
      font-weight: 500;
    }
    .ris-btn:hover { background: #e2e8f0; }

    .no-papers {
      background: #ffffff;
      border-radius: 10px;
      padding: 28px 24px;
      text-align: center;
      color: #64748b;
      font-size: 0.9rem;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<header class="site-header">
  <h1>🫀 Cardio Lit Monitor</h1>
  <p class="subtitle">Weekly digest &middot; 22 March 2026 &middot;
    <a href="https://github.com/jlmthompson/cardio-lit-monitor" target="_blank">GitHub ↗</a>
  </p>
</header>

<div class="summary-wrap">
  <div class="summary-card">
    <h2>This Week</h2>
    <p class="summary-header"></p>
    <ul></ul>
    
    <div class="legend"></div>
  </div>
</div>

<div class="controls">
  <input id="search" type="text" placeholder="Filter papers…" oninput="filterCards(this.value)">
  <span class="count-badge" id="count-label">0 of 0 candidate papers selected</span>
</div>

<div class="cards-wrap" id="cards">
<div class="no-papers">No new papers matched your focus areas this week. Check back next Monday.</div>
</div>

<script>
function filterCards(q) {
  q = q.toLowerCase();
  let shown = 0;
  document.querySelectorAll('.card').forEach(c => {
    const hide = q.length > 1 && !c.textContent.toLowerCase().includes(q);
    c.classList.toggle('hidden', hide);
    if (!hide) shown++;
  });
  const total = document.querySelectorAll('.card').length;
  document.getElementById('count-label').textContent =
    q.length > 1 ? `${shown} of ${total} papers shown` : `0 of 0 candidate papers selected`;
}
function downloadRIS(btn) {
  const ris   = btn.dataset.ris.replace(/\|/g, '\n');
  const fname = 'paper_' + btn.dataset.title + '.ris';
  const blob  = new Blob([ris], {type: 'application/x-research-info-systems'});
  const a     = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob), download: fname
  });
  a.click();
}
</script>

</body>
</html>

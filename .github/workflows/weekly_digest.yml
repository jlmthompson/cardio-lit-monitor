name: Weekly Literature Digest

on:
  schedule:
    # Every Monday at 7:00 AM Sydney time (= Sunday 9:00 PM UTC)
    - cron: '0 21 * * 0'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch papers from PubMed + PGS Catalog
        run: python scripts/fetch_papers.py

      - name: Build website
        run: python scripts/build_site.py

      - name: Send email digest
        env:
          GMAIL_ADDRESS:     ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/send_email.py

      - name: Commit and push updated digest
        run: |
          git config user.name  "cardio-lit-monitor[bot]"
          git config user.email "actions@github.com"
          git add data/digest.json docs/
          git diff --staged --quiet || git commit -m "Weekly digest $(date +'%Y-%m-%d')"
          git push

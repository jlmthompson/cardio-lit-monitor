name: Weekly Literature Digest

on:
  schedule:
    # Every Monday at 7:00 AM Sydney time (= Sunday 9:00 PM UTC)
    - cron: '0 21 * * 0'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Fetch papers from PubMed + Europe PMC (preprints)
        env:
          # LLM relevance scoring. If this secret is absent the script falls
          # back to the keyword heuristic, so the workflow still succeeds.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: raises NCBI rate limit (3 -> 10 req/s). Safe to omit.
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python scripts/fetch_papers.py

      - name: Build website
        run: python scripts/build_site.py

      - name: Commit and push updated digest
        run: |
          git config user.name  "cardio-lit-monitor[bot]"
          git config user.email "actions@github.com"
          git add data/digest.json data/seen.json docs/
          git diff --staged --quiet || git commit -m "Weekly digest $(date +'%Y-%m-%d')"
          git push
